<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>AXEROCAM · Live Feed</title>
  <link rel="stylesheet" href="/css/axerocam.css">
  <style>
    body { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

    /* ── Feed zone ── */
    .feed-zone {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    #video  { position:absolute; opacity:0; pointer-events:none; width:100%; height:100%; object-fit:cover; }
    #canvas { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }

    /* Offline state */
    .no-signal {
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
      z-index:5;
    }
    .no-signal.hidden { display:none; }

    /* Cross-hair ring animation */
    .xhair-ring {
      width:72px; height:72px;
      border-radius:50%;
      border: 1px solid rgba(0,229,255,0.18);
      position:relative;
      display:flex; align-items:center; justify-content:center;
    }
    .xhair-ring::before {
      content:'';
      position:absolute;
      width:48px; height:48px;
      border-radius:50%;
      border: 1px dashed rgba(0,229,255,0.1);
      animation: spin 8s linear infinite;
    }
    .xhair-ring::after {
      content:'';
      position:absolute;
      width:2px; height:32px;
      background: rgba(0,229,255,0.25);
      top:50%; left:50%;
      transform-origin: top center;
      animation: sweep 3s linear infinite;
    }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .xhair-dot { width:5px; height:5px; border-radius:50%; background: var(--cyan-dim); }

    /* Snapshot flash */
    .flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; transition:opacity 0.05s; z-index:10; }
    .flash.go { opacity:0.5; }

    /* Threat badge overlay */
    .threat-badge {
      position:absolute; top:44px; left:50%; transform:translateX(-50%);
      display:none;
      padding:4px 14px;
      font-family: var(--terminal);
      font-size:0.85rem;
      letter-spacing:0.2em;
      border: 1px solid var(--red);
      background: rgba(255,23,68,0.12);
      color: var(--red);
      z-index:8;
      animation: badge-pulse 1s ease infinite;
    }
    .threat-badge.show { display:block; }
    @keyframes badge-pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }

    /* ── Bottom UI ── */
    .stats-strip {
      display:grid; grid-template-columns:repeat(4,1fr);
      border-top:1px solid var(--border);
      flex-shrink:0;
    }

    .ctrl-strip {
      display:flex; border-top:1px solid var(--border); flex-shrink:0;
    }
    .ctrl-strip .btn {
      flex:1; border:none; border-right:1px solid var(--border);
      border-radius:0; padding:10px 4px;
    }
    .ctrl-strip .btn:last-child { border-right:none; }

    /* Conn bar */
    .conn-bar {
      display:flex; align-items:center; justify-content:space-between;
      padding:3px 12px;
      background: var(--surface);
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .conn-bar-left  { display:flex; align-items:center; gap:7px; font-size:0.5rem; color:var(--text-dim); letter-spacing:0.1em; }
    .conn-bar-right { font-size:0.5rem; color:var(--text-dim); letter-spacing:0.08em; }
  </style>
</head>
<body>

<div class="alert-banner" id="alertBanner">⚠ CRITICAL ALERT — UNAUTHORISED PRESENCE DETECTED</div>

<nav class="nav">
  <div class="nav-logo">AXERO<span class="accent">CAM</span><span class="version">v2.0 · AI AGENT ACTIVE</span></div>
  <div class="nav-center hide-mobile">
    <div class="status-chip" id="camChip"><div class="dot" id="camDot"></div><span id="camTxt">OFFLINE</span></div>
  </div>
  <div class="nav-right">
    <span class="nav-time" id="navTime">00:00:00</span>
    <a href="/dashboard" class="nav-link">CMD →</a>
  </div>
</nav>

<!-- Conn bar -->
<div class="conn-bar">
  <div class="conn-bar-left">
    <div class="dot" id="sockDot"></div>
    <span id="sockTxt">CONNECTING…</span>
  </div>
  <div class="conn-bar-right" id="agentStatus">AGENT: STANDBY</div>
</div>

<!-- Feed zone -->
<div class="feed-zone">
  <video id="video" playsinline muted autoplay></video>
  <canvas id="canvas"></canvas>
  <div class="no-signal" id="noSignal">
    <div class="xhair-ring"><div class="xhair-dot"></div></div>
    <div class="sig-title no-signal-box" style="font-size:1rem; letter-spacing:0.22em; color:var(--text-dim)">NO SIGNAL</div>
    <div style="font-size:0.55rem; color:var(--text-faint); letter-spacing:0.14em">PRESS ▶ START TO INITIALIZE</div>
  </div>
  <div class="threat-badge" id="threatBadge">⚠ THREAT DETECTED</div>
  <div class="flash" id="snapFlash"></div>
</div>

<!-- Stats -->
<div class="stats-strip">
  <div class="metric"><div class="metric-label">STATUS</div><div class="metric-value" id="mStat" style="font-size:0.9rem;color:var(--text-dim)">OFFLINE</div></div>
  <div class="metric"><div class="metric-label">FPS</div><div class="metric-value" id="mFps">—</div></div>
  <div class="metric"><div class="metric-label">TARGETS</div><div class="metric-value" id="mTgt">0</div></div>
  <div class="metric"><div class="metric-label">THREAT</div><div class="metric-value" id="mThreat" style="font-size:0.85rem">CLEAR</div></div>
</div>

<!-- Controls -->
<div class="ctrl-strip">
  <button class="btn btn-green"  onclick="startCam()">▶ START</button>
  <button class="btn btn-red"    onclick="stopCam()">■ STOP</button>
  <button class="btn btn-cyan"   onclick="snap()">⊙ SNAP</button>
  <button class="btn btn-orange" id="alertBtn" onclick="toggleAlert()">⚠ ALERT</button>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/detection.js"></script>
<script>
'use strict';

let engine      = null;
let alertActive = false;
window._axAlert = false;

const socket = io({ reconnectionAttempts: 30 });

socket.on('connect', () => {
  socket.emit('join_room', 'feed');
  cls('sockDot', 'on'); setText('sockTxt', 'SERVER CONNECTED');
});
socket.on('disconnect', () => {
  cls('sockDot', ''); setText('sockTxt', 'DISCONNECTED');
});

// ── Receive threat level from AI agent ──────────────────────
socket.on('threat_level', ({ level, color, score }) => {
  const el = document.getElementById('mThreat');
  el.textContent = level;
  el.style.color = color;
  document.getElementById('threatBadge').classList.toggle('show',
    level === 'CRITICAL' || level === 'HIGH');
  if (engine) engine.setThreat(level, color);
  setText('agentStatus', `AGENT: ${level} (${score})`);
});

// ── Alert state from server ──────────────────────────────────
socket.on('alert_state', ({ active }) => {
  alertActive = active;
  window._axAlert = active;
  document.getElementById('alertBanner').classList.toggle('show', active);
  document.getElementById('alertBtn').classList.toggle('active-alert', active);
});

socket.on('detection_count', (n) => setText('mTgt', n));
socket.on('agent_state', ({ enabled }) => {
  setText('agentStatus', `AGENT: ${enabled ? 'ACTIVE' : 'DISABLED'}`);
});

// ── Clock ────────────────────────────────────────────────────
setInterval(() => setText('navTime', new Date().toTimeString().slice(0,8)), 1000);

// ── Helpers ──────────────────────────────────────────────────
function setText(id, v) { const e = document.getElementById(id); if(e) e.textContent = v; }
function cls(id, c)      { const e = document.getElementById(id); if(!e) return; e.className='dot'; if(c) e.classList.add(c); }

// ── Start camera ─────────────────────────────────────────────
async function startCam() {
  if (engine && engine.running) return;

  engine = new AxeroCamEngine({
    videoEl:  document.getElementById('video'),
    canvasEl: document.getElementById('canvas'),
    onDetection: (p) => {
      socket.emit('detection_event', p);
      setText('mTgt', p.detections.length);
    },
    onFrame: (d) => {
      socket.emit('frame', d);
      setText('mFps', d.fps.toFixed(1));
    },
    onStatus: (s) => {
      setText('mStat', s);
      setText('camTxt', s);
      const live = s === 'LIVE';
      cls('camDot', live ? 'on' : '');
      document.getElementById('camChip').className = `status-chip${live?' active':''}`;
      document.getElementById('noSignal').classList.toggle('hidden', live);
    },
    onLog: () => {},
  });

  try {
    await engine.start();
    socket.emit('camera_started');
    socket.emit('detector_type', engine.detectorType);
    document.getElementById('mStat').style.color = 'var(--green)';
  } catch(err) {
    alert('Camera error: ' + err.message);
    engine = null;
  }
}

// ── Stop camera ──────────────────────────────────────────────
function stopCam() {
  if (engine) { engine.stop(); engine = null; }
  socket.emit('camera_stopped');
  setText('mStat', 'OFFLINE');
  document.getElementById('mStat').style.color = 'var(--text-dim)';
  cls('camDot', '');
  document.getElementById('noSignal').classList.remove('hidden');
}

// ── Snapshot ─────────────────────────────────────────────────
async function snap() {
  const canvas = document.getElementById('canvas');
  if (!canvas.width) return;
  const flash = document.getElementById('snapFlash');
  flash.classList.add('go');
  setTimeout(() => flash.classList.remove('go'), 100);
  const imageData = canvas.toDataURL('image/jpeg', 0.9);
  const metadata  = { lat: engine?.gps.lat, lon: engine?.gps.lon, temp: engine?.temp, fps: engine?.fps };
  await fetch('/api/snapshot', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ imageData, metadata }),
  });
}

// ── Alert ────────────────────────────────────────────────────
async function toggleAlert() {
  alertActive = !alertActive;
  window._axAlert = alertActive;
  await fetch('/api/alert', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ active: alertActive }),
  });
}

fetch('/api/status').then(r=>r.json()).then(d=>{
  if(d.cameraActive) startCam();
  if(d.alertActive) { alertActive=true; window._axAlert=true; document.getElementById('alertBanner').classList.add('show'); }
}).catch(()=>{});
</script>
</body>
</html>
