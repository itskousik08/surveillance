<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SENTINEL AI — Live Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:   #00e87a;
      --dim:     #00a855;
      --red:     #ff2a2a;
      --blue:    #00c8ff;
      --bg:      #050a08;
      --surface: #0a120e;
      --border:  rgba(0,232,122,0.18);
      --text:    #c8d8c8;
      --mono:    'Share Tech Mono', monospace;
      --head:    'Rajdhani', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── Top navbar ───────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(0,232,122,0.04);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--head);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .logo span { color: var(--blue); }
    .badge {
      font-size: 0.65rem;
      padding: 3px 9px;
      border: 1px solid var(--green);
      color: var(--green);
      letter-spacing: 2px;
      animation: pulse-border 2s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%, 100% { border-color: var(--green); color: var(--green); }
      50%       { border-color: var(--dim);  color: var(--dim);   }
    }
    .nav-link {
      color: var(--blue);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 1px;
      padding: 4px 10px;
      border: 1px solid rgba(0,200,255,0.3);
      transition: all 0.2s;
    }
    .nav-link:hover { background: rgba(0,200,255,0.1); }

    /* ── Feed wrapper ─────────────────────────── */
    .feed-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 12px;
    }

    .feed-container {
      position: relative;
      width: 100%;
      max-width: 700px;
      border: 1px solid var(--border);
      background: #000;
    }

    /* Corner brackets around feed */
    .feed-container::before,
    .feed-container::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      z-index: 5;
    }
    .feed-container::before {
      top: -1px; left: -1px;
      border-top: 2px solid var(--green);
      border-left: 2px solid var(--green);
    }
    .feed-container::after {
      bottom: -1px; right: -1px;
      border-bottom: 2px solid var(--green);
      border-right: 2px solid var(--green);
    }

    .feed-img {
      width: 100%;
      display: block;
      min-height: 200px;
      object-fit: cover;
    }

    .offline-placeholder {
      width: 100%;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--dim);
    }
    .offline-placeholder .icon { font-size: 2.5rem; }
    .offline-placeholder p { font-size: 0.75rem; letter-spacing: 2px; }

    /* ── Stats row ────────────────────────────── */
    .stats-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 700px;
      flex-wrap: wrap;
    }
    .stat-card {
      flex: 1 1 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-label { font-size: 0.55rem; color: var(--dim); letter-spacing: 2px; }
    .stat-value { font-size: 1.05rem; color: var(--green); font-weight: bold; }

    /* ── Control strip ────────────────────────── */
    .controls {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 700px;
      flex-wrap: wrap;
    }
    .btn {
      flex: 1 1 80px;
      padding: 10px 6px;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid;
      background: transparent;
      transition: all 0.15s;
    }
    .btn-green  { color: var(--green); border-color: var(--green); }
    .btn-green:hover  { background: rgba(0,232,122,0.12); }
    .btn-red    { color: var(--red);   border-color: var(--red);   }
    .btn-red:hover    { background: rgba(255,42,42,0.12); }
    .btn-blue   { color: var(--blue);  border-color: var(--blue);  }
    .btn-blue:hover   { background: rgba(0,200,255,0.12); }
    .btn-yellow { color: #ffd700;      border-color: #ffd700;      }
    .btn-yellow:hover { background: rgba(255,215,0,0.10); }

    .ticker {
      width: 100%;
      max-width: 700px;
      font-size: 0.6rem;
      color: var(--dim);
      overflow: hidden;
      white-space: nowrap;
      border-top: 1px solid var(--border);
      padding-top: 6px;
      letter-spacing: 1px;
    }
    .ticker-inner {
      display: inline-block;
      animation: ticker 30s linear infinite;
    }
    @keyframes ticker {
      0%   { transform: translateX(100vw); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">SENTINEL <span>AI</span></div>
    <div class="badge">● LIVE</div>
    <a href="/dashboard" class="nav-link">DASHBOARD →</a>
  </nav>

  <div class="feed-wrap">

    <div class="feed-container" id="feedContainer">
      <img id="feedImg" class="feed-img" src="/video_feed"
           alt="Live Feed"
           onerror="showOffline()"
           style="display:none;">
      <div class="offline-placeholder" id="offlinePlaceholder">
        <div class="icon">📡</div>
        <p>AWAITING CAMERA SIGNAL</p>
        <p style="font-size:0.6rem">Press START CAMERA below</p>
      </div>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-label">STATUS</div><div class="stat-value" id="sStatus">OFFLINE</div></div>
      <div class="stat-card"><div class="stat-label">FPS</div><div class="stat-value" id="sFps">—</div></div>
      <div class="stat-card"><div class="stat-label">TARGETS</div><div class="stat-value" id="sTargets">0</div></div>
      <div class="stat-card"><div class="stat-label">TEMP</div><div class="stat-value" id="sTemp">—</div></div>
    </div>

    <div class="controls">
      <button class="btn btn-green"  onclick="startCamera()">▶ START</button>
      <button class="btn btn-red"    onclick="stopCamera()">■ STOP</button>
      <button class="btn btn-blue"   onclick="snapshot()">⊙ SNAP</button>
      <button class="btn btn-yellow" onclick="toggleAlert()">⚠ ALERT</button>
    </div>

    <div class="ticker">
      <span class="ticker-inner" id="tickerText">
        SENTINEL AI SURVEILLANCE SYSTEM · OFFLINE READY · HUMAN DETECTION ACTIVE · MJPEG STREAM · GPS LOGGING · TACTICAL HUD ·
      </span>
    </div>

  </div>

  <script>
    let cameraActive = false;
    let alertActive  = false;

    function showOffline() {
      document.getElementById('feedImg').style.display = 'none';
      document.getElementById('offlinePlaceholder').style.display = 'flex';
    }
    function showFeed() {
      document.getElementById('feedImg').style.display = 'block';
      document.getElementById('offlinePlaceholder').style.display = 'none';
    }

    async function startCamera() {
      await fetch('/api/control/camera', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({action:'start'})
      });
      cameraActive = true;
      setTimeout(() => {
        const img = document.getElementById('feedImg');
        img.src = '/video_feed?' + Date.now();
        showFeed();
      }, 800);
    }

    async function stopCamera() {
      await fetch('/api/control/camera', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({action:'stop'})
      });
      cameraActive = false;
      showOffline();
    }

    async function snapshot() {
      const res = await fetch('/api/snapshot', {method:'POST'});
      const d   = await res.json();
      if (d.file) alert('📸 Saved: ' + d.file);
    }

    async function toggleAlert() {
      alertActive = !alertActive;
      await fetch('/api/control/alert', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({action: alertActive ? 'on' : 'off'})
      });
    }

    // Poll status every 2s
    async function pollStatus() {
      try {
        const res  = await fetch('/api/status');
        const data = await res.json();
        document.getElementById('sStatus').textContent  = data.camera_active ? 'LIVE' : 'OFFLINE';
        document.getElementById('sStatus').style.color  = data.camera_active ? 'var(--green)' : 'var(--red)';
        document.getElementById('sFps').textContent    = data.fps + ' fps';
        document.getElementById('sTargets').textContent = data.total_detections;
        document.getElementById('sTemp').textContent   = data.temperature + '°C';
        alertActive = data.alert_active;
      } catch(e) {}
    }

    setInterval(pollStatus, 2000);
    pollStatus();

    // Auto-start feed if already running
    fetch('/api/status').then(r => r.json()).then(d => {
      if (d.camera_active) {
        cameraActive = true;
        showFeed();
      }
    });
  </script>
</body>
</html>
